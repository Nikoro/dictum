name: Dictum
options:
  bundleIdPrefix: com.dominikkrajcer
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/whisperkit.git
    branch: main
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    exactVersion: 2.29.3

targets:
  Dictum:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - "*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dominikkrajcer.dictum
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Dictum.entitlements
        ENABLE_APP_SANDBOX: "NO"
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_NAME: Dictum
    dependencies:
      - package: WhisperKit
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
    entitlements:
      path: Resources/Dictum.entitlements
