name: Dictum
options:
  bundleIdPrefix: com.dominikkrajcer
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/whisperkit.git
    exactVersion: 0.18.0
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    exactVersion: 2.30.6
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.7.0"

targets:
  Dictum:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - "*.md"
          - ".git"
          - ".gitignore"
          - ".DS_Store"
          - ".claude"
          - ".github"
          - ".vscode"
          - "build"
          - "website"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dominikkrajcer.dictum
        MARKETING_VERSION: "0.6.1"
        CURRENT_PROJECT_VERSION: "202603300019"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Dictum.entitlements
        ENABLE_APP_SANDBOX: "NO"
        CODE_SIGN_IDENTITY: "Dictum Development"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: "Manual"
        PRODUCT_NAME: Dictum
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: WhisperKit
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: Sparkle
    entitlements:
      path: Resources/Dictum.entitlements
