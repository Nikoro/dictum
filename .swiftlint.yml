included:
  - .

excluded:
  - .claude
  - .git
  - .github
  - .vscode
  - build
  - Dictum.xcodeproj
  - website

reporter: xcode

analyzer_rules:
  - unused_import

opt_in_rules:
  - vertical_whitespace

cyclomatic_complexity:
  warning: 10
  error: 15

file_length:
  warning: 350

function_body_length:
  warning: 50
  error: 80

type_body_length:
  warning: 250
  error: 350

line_length:
  warning: 140
  error: 180
  ignores_comments: true
  ignores_urls: true

nesting:
  type_level:
    warning: 2

identifier_name:
  excluded:
    - id
    - pl
    - en
    - de
    - fr
    - es
    - it
    - pt
    - uk
    - cs
    - nl
    - ja
    - ko
    - zh
    - ru
    - sv
    - tr

force_cast:
  severity: warning

force_try:
  severity: warning

todo:
  severity: warning

trailing_whitespace:
  ignores_empty_lines: true

vertical_whitespace:
  max_empty_lines: 1
