name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Dictum.xcodeproj -scheme Dictum

      - name: Build Release
        run: |
          xcodebuild \
            -project Dictum.xcodeproj \
            -scheme Dictum \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE="Automatic" \
            DEVELOPMENT_TEAM=""

      - name: Package ZIP (for Sparkle updates)
        run: |
          cd build/Build/Products/Release
          zip -r Dictum.zip Dictum.app

      - name: Package PKG installer
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          APP_PATH="build/Build/Products/Release/Dictum.app"

          # Post-install script to remove quarantine flag
          mkdir -p pkg-scripts
          cat > pkg-scripts/postinstall << 'SCRIPT'
          #!/bin/bash
          xattr -dr com.apple.quarantine /Applications/Dictum.app 2>/dev/null || true
          SCRIPT
          chmod +x pkg-scripts/postinstall

          # Build component pkg
          pkgbuild \
            --root "build/Build/Products/Release" \
            --filter '.zip' \
            --install-location /Applications \
            --scripts pkg-scripts \
            --identifier com.dominikkrajcer.dictum \
            --version "$VERSION" \
            Dictum-component.pkg

          # Wrap in product archive for nicer installer UI
          cat > distribution.xml << DIST
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="2">
              <title>Dictum</title>
              <welcome file="welcome.html" />
              <options customize="never" require-scripts="false" hostArchitectures="arm64" />
              <choices-outline>
                  <line choice="default" />
              </choices-outline>
              <choice id="default" title="Dictum">
                  <pkg-ref id="com.dominikkrajcer.dictum" />
              </choice>
              <pkg-ref id="com.dominikkrajcer.dictum" version="$VERSION">Dictum-component.pkg</pkg-ref>
          </installer-gui-script>
          DIST

          # Welcome page
          cat > welcome.html << 'HTML'
          <html><body style="font-family: -apple-system, sans-serif; padding: 20px;">
          <h2>Dictum</h2>
          <p>Voice dictation for macOS — fully on-device.</p>
          <p>This installer will place <b>Dictum.app</b> in your Applications folder.</p>
          </body></html>
          HTML

          productbuild \
            --distribution distribution.xml \
            --resources . \
            --package-path . \
            Dictum.pkg

      - name: Download Sparkle tools
        run: |
          SPARKLE_VERSION="2.7.0"
          SPARKLE_SHA256="09fed60cca507d2dc542c86c22e525598af5483954a5c66366ce039647ec88e9"
          curl -sL -o /tmp/sparkle.tar.xz "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          echo "${SPARKLE_SHA256}  /tmp/sparkle.tar.xz" | shasum -a 256 -c
          tar xJf /tmp/sparkle.tar.xz -C /tmp
          chmod +x /tmp/bin/sign_update

      - name: Sign update and generate appcast
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          ZIP_PATH="build/Build/Products/Release/Dictum.zip"
          ZIP_SIZE=$(stat -f%z "$ZIP_PATH")
          DOWNLOAD_URL="https://github.com/Nikoro/dictum/releases/download/${TAG}/Dictum.zip"

          # Write key to temp file (avoids echo leaking to process list)
          KEY_FILE=$(mktemp)
          printenv SPARKLE_EDDSA_KEY > "$KEY_FILE"
          SIGNATURE_OUTPUT=$(/tmp/bin/sign_update --ed-key-file "$KEY_FILE" "$ZIP_PATH")
          rm -f "$KEY_FILE"
          ED_SIGNATURE=$(echo "$SIGNATURE_OUTPUT" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')

          # Generate appcast.xml
          cat > appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Dictum Updates</title>
              <link>https://github.com/Nikoro/dictum/releases</link>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>$(date -R)</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>26.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  length="${ZIP_SIZE}"
                  type="application/octet-stream"
                  sparkle:edSignature="${ED_SIGNATURE}"
                />
              </item>
            </channel>
          </rss>
          EOF

      - name: Extract changelog for tag
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          # Extract section for this version from CHANGELOG.md
          BODY=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          # Write to file to preserve newlines
          echo "$BODY" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          files: |
            Dictum.pkg
            build/Build/Products/Release/Dictum.zip
            appcast.xml
          draft: false
          prerelease: false
