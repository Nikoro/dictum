name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Dictum.xcodeproj -scheme Dictum

      - name: Build Release
        run: |
          xcodebuild \
            -project Dictum.xcodeproj \
            -scheme Dictum \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE="Automatic" \
            DEVELOPMENT_TEAM=""

      - name: Package app
        run: |
          cd build/Build/Products/Release
          zip -r Dictum.zip Dictum.app

      - name: Extract changelog for tag
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          # Extract section for this version from CHANGELOG.md
          BODY=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          # Write to file to preserve newlines
          echo "$BODY" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          files: build/Build/Products/Release/Dictum.zip
          draft: false
          prerelease: false
